<div class="app-shell">
  <header class="topbar">
    <div>
      <p class="eyebrow">Personal Finance</p>
      <h1>Money Control Desk</h1>
    </div>
  </header>

  <div class="layout">
    <nav class="nav">
      <a
        *ngFor="let item of navItems"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </a>
    </nav>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
